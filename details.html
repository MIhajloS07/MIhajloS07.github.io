<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmexTip 2026 | Detalji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="shortcut icon" href="./img/movieicon.png" type="image/png">
    <link rel="stylesheet" href="./css/styles.css" rel="stylesheet">
</head>

<body>
    <nav class=" navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container">
            <i class="fa-brands fa-square-js text-warning"></i>
            <i class="fa-solid fa-film text-warning"></i>
            <a class="navbar-brand fw-bold" href="./index.html">
                FilmexTip 2026
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="./index.html">
                            <i class="fa-solid fa-house-user"></i> Početna
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">
                            <i class="fa-solid fa-circle-info"></i> O nama
                        </a>
                    </li>
                </ul>
            </div>
    </nav>
    <!-- <div class="container">
        <pre id="json"></pre>
    </div> -->
    <div class="container" id="movie-details">
        <div class="row">
            <!-- Poster -->
            <div class="col-md-4 mb-3">
                <img id="poster" class="img-fluid rounded shadow" alt="Poster">
            </div>

            <!-- Osnovni podaci -->
            <div class="col-md-8">
                <h1 id="title"></h1>
                <h5 id="originalTitle" class="text-secondary"></h5>

                <p class="mt-3" id="shortDescription"></p>

                <ul class="list-group list-group-flush mt-3">
                    <li class="list-group-item">
                        🎬 Režiser: <strong id="director"></strong>
                    </li>
                    <li class="list-group-item">
                        ⏱ Trajanje: <strong id="runtime"></strong> min
                    </li>
                    <li class="list-group-item">
                        📅 Datum izlaska: <strong id="startDate"></strong>
                    </li>
                    <li class="list-group-item">
                        🎭 Žanrovi: <span id="genres"></span>
                    </li>
                    <li class="list-group-item">
                        ⭐ Glumci: <span id="actors"></span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Opis -->
        <div class="row mt-4">
            <div class="col-12">
                <h3>Opis</h3>
                <p id="description"></p>
            </div>
        </div>
    </div>

    <script src="./js/details.js"></script>
    <script src="./js/theme.js"></script>
</body>

</html>
